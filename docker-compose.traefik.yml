version: '3.8'

services:
  # C++ Redis Server
  redis-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.cpp
    container_name: scuffed-redis-server
    restart: unless-stopped
    # Run a tini-style init as PID 1 so healthcheck-spawned bash/timeout
    # processes are reaped (the C++ server doesn't handle SIGCHLD).
    init: true
    networks:
      - traefik-public
      - redis-internal
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/6379' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Node.js Backend Server
  server:
    image: node:18-alpine
    container_name: scuffed-redis-backend
    working_dir: /app
    volumes:
      - ./server:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - PORT=4000
      - USE_SCUFFED_REDIS=true
      - SCUFFED_REDIS_PORT=6379
      - REDIS_URL=redis://redis-server:6379
      - NODE_ENV=development
      - CORS_ORIGIN=https://gopee.dev
    depends_on:
      - redis-server
    networks:
      - traefik-public
      - redis-internal
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # API router
      - "traefik.http.routers.redis-api.rule=Host(`gopee.dev`) && PathPrefix(`/redis/api`)"
      - "traefik.http.routers.redis-api.entrypoints=websecure"
      - "traefik.http.routers.redis-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.redis-api.priority=300"
      - "traefik.http.routers.redis-api.service=redis-api"
      - "traefik.http.routers.redis-api.middlewares=redis-api-strip,security-headers@file,compression@file,rate-limit-api@file"
      - "traefik.http.middlewares.redis-api-strip.stripprefix.prefixes=/redis/api"
      - "traefik.http.services.redis-api.loadbalancer.server.port=4000"
      # WebSocket router
      - "traefik.http.routers.redis-ws.rule=Host(`gopee.dev`) && PathPrefix(`/redis/socket.io`)"
      - "traefik.http.routers.redis-ws.entrypoints=websecure"
      - "traefik.http.routers.redis-ws.tls.certresolver=letsencrypt"
      - "traefik.http.routers.redis-ws.priority=300"
      - "traefik.http.routers.redis-ws.service=redis-ws"
      - "traefik.http.middlewares.redis-ws-strip.stripprefix.prefixes=/redis"
      - "traefik.http.routers.redis-ws.middlewares=redis-ws-strip"
      - "traefik.http.services.redis-ws.loadbalancer.server.port=4000"

  # React Frontend
  web:
    image: node:18-alpine
    container_name: scuffed-redis-frontend
    working_dir: /app
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"
    environment:
      - NEXT_PUBLIC_SERVER_URL=https://gopee.dev/redis
      - NODE_ENV=development
    depends_on:
      - server
    networks:
      - traefik-public
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Frontend router - Next.js handles /redis basePath natively
      - "traefik.http.routers.redis-web.rule=Host(`gopee.dev`) && PathPrefix(`/redis`)"
      - "traefik.http.routers.redis-web.entrypoints=websecure"
      - "traefik.http.routers.redis-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.redis-web.priority=200"
      - "traefik.http.routers.redis-web.middlewares=security-headers@file,compression@file,rate-limit-general@file"
      - "traefik.http.services.redis-web.loadbalancer.server.port=3000"

networks:
  traefik-public:
    external: true
  redis-internal:
    driver: bridge
